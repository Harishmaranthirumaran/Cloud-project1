name: CI

on:
  pull_request:
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: app
        run: npm install
      - name: Test
        working-directory: app
        run: npm test

