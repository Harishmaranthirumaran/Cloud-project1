name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to promote"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Promote to prod
        env:
          ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME_PROD }}
          ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME_PROD }}
        run: aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_NAME}" --force-new-deployment
