apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-api
spec:
  ingressClassName: nginx
  rules:
    - host: sample.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-api
                port:
                  number: 80
