apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/cloud-project1.git
    targetRevision: HEAD
    path: projects/14-kubernetes-gitops-platform/services/sample-api
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
