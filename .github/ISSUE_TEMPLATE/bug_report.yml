name: Bug report
description: Report a problem in the repository
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a reproducible problem in the repo.

  - type: textarea
    id: happened
    attributes:
      label: What happened
      description: Describe the problem you saw.
      placeholder: A clear description of the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the minimal steps required to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or other details that help with triage.
