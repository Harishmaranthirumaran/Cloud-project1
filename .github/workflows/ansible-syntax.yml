name: Ansible Syntax

on:
  push:
    paths:
      - "projects/16-ansible-ops-automation/**"
      - ".github/workflows/ansible-syntax.yml"
  pull_request:
    paths:
      - "projects/16-ansible-ops-automation/**"
      - ".github/workflows/ansible-syntax.yml"

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Syntax check bootstrap
        working-directory: projects/16-ansible-ops-automation
        run: ansible-playbook --syntax-check playbooks/bootstrap.yml

      - name: Syntax check hardening
        working-directory: projects/16-ansible-ops-automation
        run: ansible-playbook --syntax-check playbooks/hardening.yml
